# ClinIQ Prometheus Configuration
# Scrape metrics from all platform services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: cliniq-prod
    environment: production

scrape_configs:
  # =============================================
  # Prometheus Self-Monitoring
  # =============================================
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus

  # =============================================
  # ClinIQ API (FastAPI + Prometheus metrics)
  # =============================================
  - job_name: cliniq-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000
        labels:
          service: api
          component: backend

  # =============================================
  # Node Exporter (System/Host Metrics)
  # =============================================
  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: node-exporter
          component: infrastructure

  # =============================================
  # Redis Exporter
  # =============================================
  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: redis
          component: cache

  # =============================================
  # PostgreSQL Exporter
  # =============================================
  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          service: postgres
          component: database
