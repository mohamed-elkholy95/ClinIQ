apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cliniq-models-pvc
  namespace: cliniq
  labels:
    app.kubernetes.io/name: cliniq-models
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: cliniq-platform
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
