apiVersion: v1
kind: Secret
metadata:
  name: cliniq-secrets
  namespace: cliniq
  labels:
    app.kubernetes.io/name: cliniq-secrets
    app.kubernetes.io/part-of: cliniq-platform
type: Opaque
# Replace base64-encoded values before applying.
# Generate with: echo -n "value" | base64
# NEVER commit real secrets to version control — use sealed-secrets,
# external-secrets-operator, or a Vault integration in production.
stringData:
  # Database (PostgreSQL)
  database-url: "postgresql+asyncpg://cliniq:CHANGE_ME@postgres:5432/cliniq"

  # Cache / Queue (Redis)
  redis-url: "redis://:CHANGE_ME@redis:6379/0"

  # Application secret key (generate: openssl rand -hex 32)
  secret-key: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_HEX_32"

  # Object storage (MinIO)
  minio-access-key: "CHANGE_ME"
  minio-secret-key: "CHANGE_ME"

  # Grafana admin
  grafana-admin-password: "CHANGE_ME"
