apiVersion: apps/v1
kind: Deployment
metadata:
  name: cliniq-redis
  namespace: cliniq
  labels:
    app.kubernetes.io/name: cliniq-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: cliniq-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cliniq-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cliniq-redis
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --maxmemory
            - 512mb
            - --maxmemory-policy
            - allkeys-lru
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cliniq-secrets
                  key: grafana-admin-password
          ports:
            - containerPort: 6379
              protocol: TCP
              name: redis
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: cliniq-redis-pvc
      terminationGracePeriodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: cliniq
  labels:
    app.kubernetes.io/name: cliniq-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: cliniq-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cliniq-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
